<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Map Boundary Builder</title>
    <link rel="icon" type="image/png" href="/static/boundary-builder-icon.png" />
    <link rel="apple-touch-icon" href="/static/boundary-builder-icon.png" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="control-panel">
        <header class="brand">
          <button id="brandButton" class="brand-mark-button" type="button" aria-label="Start a new run" title="Start a new run">
            <img class="brand-mark" src="/static/boundary-builder-icon.png" alt="" width="48" height="48" aria-hidden="true" />
          </button>
          <div>
            <h1>Boundary Builder</h1>
            <p>Image to GeoJSON</p>
          </div>
        </header>

        <form id="runForm" class="run-form">
          <label id="compactDropZone" class="file-summary" data-drop-target for="imageInput">
            <span class="eyebrow">Image</span>
            <strong id="fileName">No image selected</strong>
            <span id="fileMeta">Drop a screenshot in the workspace</span>
          </label>

          <div class="run-actions">
            <button id="runButton" class="primary-action" type="submit">
              <span>Run Boundary</span>
              <span aria-hidden="true">-></span>
            </button>

            <details class="advanced">
              <summary aria-label="Fit settings" title="Fit settings">
                <span class="settings-icon" aria-hidden="true"><span></span><span></span><span></span></span>
                <span class="sr-only">Fit Settings</span>
              </summary>
              <div class="advanced-fields">
                <label class="field compact">
                  <span>Confidence Floor</span>
                  <input id="confidenceInput" name="min_confidence" type="number" min="0" max="1" step="0.01" value="0.55" />
                </label>
                <label class="field compact">
                  <span>Control Points</span>
                  <input id="controlInput" name="min_control_points" type="number" min="0" max="12" step="1" value="3" />
                </label>
                <label class="field compact">
                  <span>Simplify PX</span>
                  <input id="simplifyInput" name="simplify_px" type="number" min="0" max="10" step="0.05" value="6" />
                </label>
              </div>
            </details>
          </div>
        </form>

        <section class="history-panel" aria-labelledby="historyTitle">
          <div class="history-head">
            <div>
              <span class="eyebrow">Local</span>
              <h2 id="historyTitle">History</h2>
            </div>
            <button id="newRunButton" class="new-run-button" type="button">New Run</button>
          </div>
          <p id="historyEmpty" class="history-empty">No saved generations yet.</p>
          <ol id="historyList" class="history-list"></ol>
        </section>

        <section class="progress-panel" aria-live="polite">
          <div class="progress-head">
            <div>
              <span class="eyebrow">Run</span>
              <strong id="statusText">Idle</strong>
            </div>
            <span id="percentText">Ready</span>
          </div>
          <p id="progressNote" class="progress-note">Add a map screenshot to start.</p>
          <div id="progressMeter" class="meter" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <span id="progressFill"></span>
          </div>
          <ol id="timeline" class="timeline"></ol>
        </section>
      </aside>

      <main class="workspace">
        <h2 id="workspaceTitle" class="sr-only">Ready for a screenshot</h2>

        <section class="preview-stage">
          <div class="preview-header">
            <nav class="tabs" aria-label="Preview tabs">
              <button class="tab active" type="button" data-tab="input">Input</button>
              <button class="tab" type="button" data-tab="overlay">Overlay</button>
              <button class="tab" type="button" data-tab="boundary">Boundary</button>
              <button class="tab" type="button" data-tab="geojson">GeoJSON</button>
            </nav>
            <div class="actions" aria-label="Output actions">
              <a id="downloadLink" class="ghost-action disabled" href="#" aria-disabled="true">GeoJSON</a>
              <button id="copyButton" class="ghost-action" type="button" disabled>Copy</button>
            </div>
          </div>

          <div class="pane active" id="inputPane" data-pane="input">
            <label id="dropZone" class="drop-zone primary-drop" data-drop-target for="imageInput">
              <input id="imageInput" name="image" type="file" accept="image/*" form="runForm" />
              <span class="drop-mark" aria-hidden="true">+</span>
              <span class="eyebrow">Image Upload</span>
              <strong id="dropTitle">Drop map screenshot</strong>
              <span id="dropMeta">PNG, JPG, WebP, TIFF</span>
            </label>
            <img id="inputPreview" alt="Uploaded map screenshot preview" />
          </div>

          <div class="pane" id="overlayPane" data-pane="overlay">
            <div class="empty-state">Overlay appears after extraction</div>
            <img id="overlayPreview" alt="Extracted mask overlay preview" />
          </div>

          <div class="pane boundary-pane" id="boundaryPane" data-pane="boundary">
            <div id="boundaryMap" class="boundary-map" role="img" aria-label="Generated GeoJSON boundary on OpenFreeMap"></div>
            <svg id="boundarySvg" class="boundary-fallback" role="img" aria-label="Generated GeoJSON boundary preview"></svg>
            <div id="boundaryEmpty" class="empty-state">Boundary appears after export</div>
          </div>

          <pre class="pane code-pane" id="geojsonPane" data-pane="geojson">{}</pre>
        </section>

        <section id="metricGrid" class="metric-grid" aria-label="Run metrics"></section>
      </main>
    </div>

    <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js" defer></script>
    <script src="/static/app.js" defer></script>
  </body>
</html>
